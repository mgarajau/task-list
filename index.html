<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas de Tarefas - Projeto Final</title>
    <link rel="stylesheet" href="style.css">
    <script src="./index.js" defer></script>
</head>
<body>
    <main>
        <h1>Listas de Tarefas</h1>
        <section class="task-input-section">
            <input type="text" id="task-input" placeholder="Digite uma nova tarefa...">
            <button id="addTaskButton">+</button>
        </section>
        <section class="task-list-section">
            <ul id="task-list">
                <!-- As tarefas serão adicionadas aqui dinamicamente -->
            </ul>
        </section>
            
    </main>
    
</body>
</html>
